name: CI on Pull Request

# The jobs below will execute any time a PR is created.
on: 
  pull_request:
  push:
    branches:
      - 'master'

jobs:
  # Runs build, test, package, and e2e checks.
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        os: [linux]
        arch: [amd64, arm64, arm]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install CI tools
        run: bash ./scripts/install-ci-tools

      - name: Run CI
        run: make ci ARCH=${{ matrix.arch }}
      
      - name: Run e2e
        if: ${{ matrix.arch == 'amd64' }}
        run: |
          make e2e-sonobuoy ARCH=${{ matrix.arch }}
          make e2e-verify ARCH=${{ matrix.arch }}
