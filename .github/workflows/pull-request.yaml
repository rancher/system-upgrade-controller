name: CI on Pull Request

# The jobs below will execute any time a PR is created.
on: 
  pull_request:
  push:
    branches:
      - 'master'

jobs:
  # Runs build, test, package, and e2e checks.
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        os: [linux]
        arch: [amd64, arm64, arm]
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Install CI tools
        run: bash ./scripts/install-ci-tools

      - name: Run CI
        run: make ci ARCH=${{ matrix.arch }}
      
      - name: Run e2e
        if: ${{ matrix.arch == 'amd64' }}
        run: |
          make e2e-sonobuoy ARCH=${{ matrix.arch }}
          make e2e-verify ARCH=${{ matrix.arch }}
