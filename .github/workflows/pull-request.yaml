name: CI on Pull Request

# The jobs below will execute any time a PR is created.
on: 
  pull_request:
  push:
    branches:
      - 'master'

jobs:
  # Runs build, test, package, and e2e checks.
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        os: [linux]
        arch: [amd64, arm64, arm]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: 'go.mod'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install CI tools
        run: bash ./scripts/install-ci-tools

      - name: Run CI
        run: make ci ARCH=${{ matrix.arch }}
      
      - name: Run e2e
        if: ${{ matrix.arch == 'amd64' }}
        run: |
          make e2e-sonobuoy ARCH=${{ matrix.arch }}
          make e2e-verify ARCH=${{ matrix.arch }}
